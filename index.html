<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你是否真的应该离职？</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            /* 清新治愈调色板 */
            --bg-color: #fdfcf9;       /* 暖白/米白背景 */
            --card-bg: #ffffff;        /* 纯白卡片 */
            --text-main: #4a4238;      /* 深咖灰色主文字，温和不刺眼 */
            --text-sub: #8c8278;       /* 浅咖色副标题/注释 */
            --accent-green: #8ba888;   /* 浅绿/莫兰迪绿 (主色) */
            --accent-green-hover: #728f6f;
            --accent-brown: #c4b2a1;   /* 浅咖色/卡其色 (辅色) */
            --danger-color: #d97762;   /* 柔和的砖红色，用于警告 */
            --border-light: #e8e3dd;   /* 极浅的咖色边框 */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 480px; /* 移动端优先 */
            min-height: 100vh;
            position: relative;
            background: linear-gradient(to bottom, #fdfcf9 0%, #ffffff 100%);
            box-shadow: 0 0 20px rgba(74, 66, 56, 0.05);
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* 视图通用样式 */
        .view {
            position: absolute;
            top: 0; left: 0; width: 100%; min-height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateX(20px);
        }

        .view.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
            position: relative;
        }

        /* Page 1: 欢迎页 */
        #page-welcome { justify-content: center; align-items: center; text-align: center; }
        .title-glow {
            font-size: 30px; font-weight: 800; margin-bottom: 16px;
            color: transparent;
            background: linear-gradient(90deg, #6c8a69, #a6917e);
            -webkit-background-clip: text;
            text-shadow: 0 4px 10px rgba(139,168,136,0.2);
            line-height: 1.3;
        }
        .subtitle { font-size: 15px; color: var(--text-sub); margin-bottom: 48px; line-height: 1.6; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #a3bfa0);
            color: #fff; border: none; padding: 16px 48px; border-radius: 30px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(139,168,136,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:active { transform: scale(0.96); }

        /* Page 2: 答题页 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .back-btn { color: var(--text-sub); font-size: 14px; cursor: pointer; display: flex; align-items: center;}
        .progress-text { font-size: 14px; font-weight: bold; color: var(--accent-green); }
        .progress-bar-bg { width: 100%; height: 6px; background: #efebe6; border-radius: 3px; margin-bottom: 32px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--accent-green); width: 0%; transition: width 0.3s ease; }
        
        .question-text { font-size: 18px; font-weight: 600; line-height: 1.5; margin-bottom: 32px; color: var(--text-main); }
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-card {
            background: var(--card-bg); border: 1px solid var(--border-light); border-radius: 12px;
            padding: 16px; font-size: 15px; cursor: pointer; color: var(--text-main);
            transition: all 0.2s ease; line-height: 1.4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .option-card:hover, .option-card:active {
            border-color: var(--accent-green); background: rgba(139,168,136,0.05);
            box-shadow: 0 4px 12px rgba(139,168,136,0.1);
        }

        /* Page 3: 加载页 */
        #page-loading { justify-content: center; align-items: center; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(139,168,136,0.2);
            border-top-color: var(--accent-green); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 24px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Page 4: 结果页 */
        #veto-banner {
            background: rgba(217,119,98,0.1); border: 1px solid var(--danger-color);
            color: var(--danger-color); padding: 12px; border-radius: 8px;
            text-align: center; font-weight: bold; font-size: 14px; margin-bottom: 20px;
            display: none;
        }
        .result-title { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .result-tag { text-align: center; font-size: 14px; color: var(--accent-brown); margin-bottom: 24px; font-weight: 500;}
        
        #radar-chart { width: 100%; height: 320px; margin-bottom: 24px; }
        
        /* 进度条列表 */
        .dim-bars-container { background: var(--card-bg); border: 1px solid var(--border-light); border-radius: 12px; padding: 16px; margin-bottom: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .dim-item { margin-bottom: 12px; }
        .dim-item:last-child { margin-bottom: 0; }
        .dim-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-main); margin-bottom: 6px; font-weight: 500;}
        .dim-bg { width: 100%; height: 6px; background: #efebe6; border-radius: 3px; overflow: hidden; }
        .dim-fill { height: 100%; border-radius: 3px; }

        /* 文字区块 */
        .section-title { font-size: 16px; font-weight: bold; border-left: 4px solid var(--accent-green); padding-left: 8px; margin-bottom: 12px; color: var(--text-main); }
        .text-block { font-size: 14px; line-height: 1.6; color: var(--text-main); margin-bottom: 24px; text-align: justify; }
        
        /* 优化后的：处境真相 (左对齐 + 防止单字) */
        .truth-box {
            background: rgba(196, 178, 161, 0.1); /* 极浅的咖色底 */
            border: 1px solid rgba(196, 178, 161, 0.3);
            border-radius: 12px; padding: 16px;
            font-weight: 500; color: var(--text-main); margin-bottom: 24px; 
            text-align: left; /* 左对齐 */
            text-wrap: pretty; /* 防止单字成行 */
            line-height: 1.6;
            font-size: 14px;
        }
        
        .guide-list { list-style: none; margin-bottom: 24px; }
        .guide-list li {
            position: relative; padding-left: 20px; font-size: 14px; line-height: 1.6; color: var(--text-main); margin-bottom: 12px;
            text-align: justify;
        }
        .guide-list li::before {
            content: "✦"; position: absolute; left: 0; color: var(--accent-green); font-size: 14px;
        }

        /* 优化后的：温度箴言 (左对齐 + 防止单字 + 浅色呼吸灯) */
        .warm-box {
            background: rgba(139, 168, 136, 0.03);
            border: 1px solid var(--accent-green); border-radius: 12px; padding: 20px;
            font-size: 14px; line-height: 1.6; color: var(--text-main); 
            text-align: left; /* 左对齐 */
            text-wrap: pretty; /* 防止单字成行 */
            font-style: normal; 
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe {
            0% { box-shadow: 0 0 5px rgba(139, 168, 136, 0.1); }
            50% { box-shadow: 0 0 15px rgba(139, 168, 136, 0.3); }
            100% { box-shadow: 0 0 5px rgba(139, 168, 136, 0.1); }
        }

        .restart-btn {
            display: block; width: 100%; background: transparent; border: 1px solid var(--accent-brown);
            color: var(--text-main); padding: 14px; border-radius: 30px; text-align: center;
            margin-top: 32px; margin-bottom: 24px; cursor: pointer; font-size: 15px; font-weight: 500;
            transition: all 0.2s;
        }
        .restart-btn:active { background: rgba(196,178,161,0.1); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="page-welcome" class="view">
        <h1 class="title-glow">你是否真的应该离职？</h1>
        <p class="subtitle">剥离情绪滤镜，透视底层筹码。<br>30道灵魂拷问，测出你的真实职场抗风险血条与出路。</p>
        <button class="btn-primary" onclick="startQuiz()">开始深度诊断</button>
    </div>

    <div id="page-quiz" class="view">
        <div class="header">
            <div class="back-btn" onclick="prevQuestion()" id="back-btn">← 上一题</div>
            <div class="progress-text"><span id="curr-q">1</span> / 30</div>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
        <div class="question-text" id="question-text">问题加载中...</div>
        <div class="options-container" id="options-container">
            </div>
    </div>

    <div id="page-loading" class="view">
        <div class="spinner"></div>
        <div style="font-size: 16px; color: var(--accent-green); font-weight: bold;">正在生成职场能量诊断报告...</div>
    </div>

    <div id="page-result" class="view">
        <div id="veto-banner">🚨 一票否决：生存血条极低，严禁裸辞！</div>
        
        <h2 class="result-title title-glow" id="res-title">加载中</h2>
        <div class="result-tag" id="res-tag">标签加载中</div>

        <div id="radar-chart"></div>

        <div class="dim-bars-container" id="dim-bars">
            </div>

        <div class="section-title">细化人格画像</div>
        <div class="text-block" id="res-persona"></div>

        <div class="truth-box" id="res-truth"></div>

        <div class="section-title">落地行动指南</div>
        <ul class="guide-list" id="res-guide"></ul>

        <div class="warm-box" id="res-warm"></div>

        <button class="restart-btn" onclick="restartQuiz()">重新测试</button>
    </div>
</div>

<script>
    // --- 数据定义区 (保留了你修改后的所有题目和分数选项) ---
    const questions = [
        // 维度一：财务安全感 (Q1-Q5)
        { text: "1. 存款覆盖：不计入任何后续收入，你现有的可支配存款能支撑你维持现有生活水平多久？", options: [ {s:1, t:"1-3个月，停薪即破产"}, {s:2, t:"3-6个月，有短期断炊焦虑"}, {s:3, t:"6-12个月，能体面地度过一个短Gap"}, {s:4, t:"12-24个月，有充足的找工作缓冲期"}, {s:5, t:"24个月以上，甚至有被动收入，心中不慌"} ]},
        { text: "2. 负债比重：每月刚性支出（房贷、车贷、房租等）占你目前月收入的比例？", options: [ {s:1, t:"70%以上，睁眼就欠钱，压力极大"}, {s:2, t:"50%-70%，财务紧绷"}, {s:3, t:"30%-50%，属于合理的杠杆范围"}, {s:4, t:"10%-30%，负债压力很小"}, {s:5, t:"几乎为零，真正的“轻资产”状态"} ]},
        { text: "3. 资金弹性：面对突发重疾或家庭意外支出的应对能力？", options: [ {s:1, t:"完全无法应对，一击即溃"}, {s:2, t:"必须向亲友借钱才能度过"}, {s:3, t:"勉强能凑出，但会严重影响生活质量"}, {s:4, t:"有充足的家庭准备金或部分商业医疗险"}, {s:5, t:"保障体系极其完善，无后顾之忧"} ]},
        { text: "4. 收入吸引力：你目前的综合年薪在同城市/同行业中处于什么水平？", options: [ {s:5, t:"远低于平均水平，勉强糊口"}, {s:4, t:"中等偏下，刚好够花"}, {s:3, t:"行业平均水平，不多不少"}, {s:2, t:"属于高薪层级，很难在外面找到同等薪资"}, {s:1, t:"极其丰厚，如果不干这行可能拿不到这么多"} ]},
        { text: "5. 职业护城河：排除主观离职意愿，该岗位/公司在未来一年内发生变动的可能性？", options: [ {s:5, t:"极高，已经听到裁员风声或业务已停摆"}, {s:4, t:"较高，行业下行，公司在缩减开支"}, {s:3, t:"一般，目前还算稳健"}, {s:2, t:"很低，核心部门，公司现金流充足"}, {s:1, t:"极低，除非自己走，否则公司会一直养着你"} ]},
        
        // 维度二：风险承受力 (Q6-Q8)
        { text: "6. 家庭支持网络：你的家庭结构和经济状况，对你“折腾”或“Gap”的支持程度？", options: [ {s:1, t:"极度反对/唯一支柱，绝不能断供"}, {s:2, t:"家人担忧，会带来极大的情绪压力"}, {s:3, t:"中立不干涉，靠自己攒的钱折腾"}, {s:4, t:"伴侣或家人能提供精神支持，分担经济压力"}, {s:5, t:"全力支持，且有强大的经济后盾托底"} ]},
        { text: "7. 心态弹性：面对辞职后待业的不确定性和社会评价，你的心态稳健度？", options: [ {s:1, t:"极易崩溃，离开光环会极其自卑"}, {s:2, t:"比较敏感焦虑，怕被问起现状"}, {s:3, t:"顺其自然，偶尔焦虑但能排解"}, {s:4, t:"拥有较强的课题分离能力，不在乎别人眼光"}, {s:5, t:"心理素质过硬，享受打破常规的旷野感"} ]},
        { text: "8. 退路准备：如果决定离职去尝试新方向，是否有兜底备案？", options: [ {s:1, t:"毫无退路，失败就万劫不复"}, {s:2, t:"有点模糊的想法，但还没做"}, {s:3, t:"想法已落地，在验证中，走一步看一步"}, {s:4, t:"有可变现副业/兼职，能覆盖基本开支"}, {s:5, t:"退路极其稳固（随时回前司/有私活/收租…）"} ]},

        // 维度三：身心耗竭度 (Q9-Q14)
        { text: "9. 周日情绪：周日傍晚想到次日要上班，第一反应是？", options: [ {s:1, t:"轻松平静，甚至有点期待"}, {s:2, t:"略有压力，但能自我调节"}, {s:3, t:"麻木/说不清，打工人的宿命"}, {s:4, t:"明显焦虑烦躁，拖延入睡"}, {s:5, t:"严重生理反感，失眠想哭绝望"} ]},
        { text: "10. 职场情绪：在公司时对人际沟通和跨部门协作的容忍度？", options: [ {s:1, t:"游刃有余，能提供情绪价值"}, {s:2, t:"偶尔烦躁，但能高效解决"}, {s:3, t:"戴上面具，维持职业化的克制"}, {s:4, t:"经常处于暴躁边缘"}, {s:5, t:"彻底丧失耐心，想掀桌子或开骂"} ]},
        { text: "11. 生命力损耗：下班回家后，是否还有能量进行个人兴趣或自我提升？", options: [ {s:1, t:"精力旺盛，下班才是生活的开始"}, {s:2, t:"略显疲惫，休息一会就能恢复"}, {s:3, t:"视当天工作强度而定"}, {s:4, t:"很难集中精神，只想躺着"}, {s:5, t:"被彻底“吸干”，连回微信力气都没有"} ]},
        { text: "12. 躯体化反应：过去三个月，身体是否发出了明显警告？", options: [ {s:1, t:"非常健康"}, {s:2, t:"偶有小毛病"}, {s:3, t:"亚健康常态，易感冒疲惫"}, {s:4, t:"出现明显职业病，频繁失眠/脱发"}, {s:5, t:"查出具体器质性病变/心理疾病"} ]},
        { text: "13. 内耗溯源：日常工作中，消耗你最多精力的事情是？", options: [ {s:1, t:"攻克有意思的难题"}, {s:2, t:"正常的项目推进"}, {s:3, t:"一半业务，一半沟通"}, {s:4, t:"大量向上管理和复杂人际关系"}, {s:5, t:"纯粹的职场政治、背锅及无意义材料"} ]},
        { text: "14. 职业冷漠感：你现在对公司项目的成败还有多在乎？", options: [ {s:1, t:"高度负责，当成事业"}, {s:2, t:"尽力而为，对得起薪水"}, {s:3, t:"只做分内之事"}, {s:4, t:"极其麻木，经常摸鱼逃避"}, {s:5, t:"彻底摆烂，甚至希望项目早点黄掉"} ]},

        // 维度四：职业瓶颈感 (Q15-Q20)
        { text: "15. 成长速度：目前的工作是否还在拓宽你的认知边界？", options: [ {s:1, t:"每天都有新挑战，飞速成长"}, {s:2, t:"稳步提升，能学新东西"}, {s:3, t:"偶尔有启发，大部分是熟练工"}, {s:4, t:"成长极其缓慢，在吃老本"}, {s:5, t:"完全停滞甚至退化"} ]},
        { text: "16. 角色匹配：你在这个组织里，是螺丝钉还是贡献者？", options: [ {s:1, t:"核心骨干，不可替代"}, {s:2, t:"关键成员，有发挥空间"}, {s:3, t:"中规中矩的执行者"}, {s:4, t:"边缘化，才华被稀释"}, {s:5, t:"纯粹的“纺织工”，随时可被替换"} ]},
        { text: "17. 掌控权：对自己工作节奏和交付质量的掌控权有多大？", options: [ {s:1, t:"极高，我是核心主导者"}, {s:2, t:"较高，能在框架内发挥"}, {s:3, t:"一般，按部就班"}, {s:4, t:"很低，被动接受指令"}, {s:5, t:"毫无掌控权，执行荒谬决定"} ]},
        { text: "18. 价值对齐：你的价值观与公司核心业务方向契合度？", options: [ {s:1, t:"高度一致"}, {s:2, t:"比较认可"}, {s:3, t:"谈不上认同或反对"}, {s:4, t:"觉得战略很蠢，浪费资源"}, {s:5, t:"强烈冲突，觉得公司在“作恶”"} ]},
        { text: "19. 技能保鲜度：你目前核心技能在行业趋势中的位置？", options: [ {s:1, t:"绝对前沿，引领趋势"}, {s:2, t:"主流标准，市场通用"}, {s:3, t:"偏传统，特定领域够用"}, {s:4, t:"开始落后，天花板可见"}, {s:5, t:"淘汰边缘，极易被平替"} ]},
        { text: "20. 未来期待：维持现状，对3年后成为上司那种状态的期待？", options: [ {s:1, t:"充满希望"}, {s:2, t:"比较满意"}, {s:3, t:"顺其自然"}, {s:4, t:"感到压抑，不想过那种生活"}, {s:5, t:"极其抗拒，给Title都不想要"} ]},

        // 维度五：市场竞争力 (Q21-Q26)
        { text: "21. 行情感知：市场上对你这类人才的需求程度？", options: [ {s:1, t:"极度萎缩，大规模裁员"}, {s:2, t:"竞争极其激烈，卷出天际"}, {s:3, t:"说不清，看机会和运气"}, {s:4, t:"需求较多，健康流动"}, {s:5, t:"极度抢手，供不应求"} ]},
        { text: "22. 简历回馈：短期内拿到优质 Offer 的信心？", options: [ {s:1, t:"毫无信心，石沉大海"}, {s:2, t:"比较心虚，可能降薪降级"}, {s:3, t:"平薪跳槽应该有机会"}, {s:4, t:"较有把握，猎头主动撩"}, {s:5, t:"志在必得，手里有现成意向"} ]},
        { text: "23. 硬通货作品：剥离平台Title，是否有个人实绩证明实力？", options: [ {s:1, t:"离开现在的平台，我什么都不是"}, {s:2, t:"碎片化产出，很难量化"}, {s:3, t:"简历上有不错的数据和经历"}, {s:4, t:"有完整项目操盘经验、方法论"}, {s:5, t:"有行业广泛认可的个人作品或强IP"} ]},
        { text: "24. 底层能力迁移：换行或换工作，底层能力迁移性如何？", options: [ {s:1, t:"完全不相关，纯小白"}, {s:2, t:"需大范围重塑，沉没成本高"}, {s:3, t:"有一定参考价值，省去摸索期"}, {s:4, t:"迁移性很强，快速赋能新领域"}, {s:5, t:"完全复用，且形成降维打击"} ]},
        { text: "25. 范式转移适应力：面对行业技术革新的拥抱程度？", options: [ {s:1, t:"极度排斥，与我无关"}, {s:2, t:"感到焦虑，但毫无行动"}, {s:3, t:"偶尔看资讯了解概念"}, {s:4, t:"能熟练使用新工具并建立自己的工作流"}, {s:5, t:"深度研究，能用新技术变现"} ]},
        { text: "26. 人脉与情报网：目标领域有效人脉资源？", options: [ {s:1, t:"完全两眼一抹黑"}, {s:2, t:"仅限于点赞的点头之交"}, {s:3, t:"认识几个同行，能打听基础信息"}, {s:4, t:"有可深入交流的前辈/前同事"}, {s:5, t:"圈内资源极其丰富，有大佬愿带/挖"} ]},

        // 维度六：核心驱动与路径 (Q27-Q30)
        { text: "27. 新目标清晰度：接下来想干什么/认可的意义思考得有多清楚？", options: [ {s:1, t:"极其迷茫，完全不知道下一步"}, {s:2, t:"只有一个模糊的念头"}, {s:3, t:"有几个具体备选方向正在权衡"}, {s:4, t:"目标明确，已做初步调研"}, {s:5, t:"极其精准，连详细路径都画好了"} ]},
        { text: "28. 好奇心与执行力：面对心动新领域的主动学习渴望和执行率？", options: [ {s:1, t:"懒得改变"}, {s:2, t:"偶尔买课，三天打鱼两天晒网"}, {s:3, t:"按部就班保持学习节奏"}, {s:4, t:"行动迅速，已做出雏形/Demo"}, {s:5, t:"旺盛求知欲+恐怖执行力，死磕到底"} ]},
        { text: "29. 意义感权重：若新工作前期辛苦收入减，但价值认同高，愿意付出的程度？", options: [ {s:1, t:"绝对不干，打工只为搞钱"}, {s:2, t:"除非能保证很快赚大钱"}, {s:3, t:"看心情和存款"}, {s:4, t:"愿忍受阵痛期，换取做热爱之事的权利"}, {s:5, t:"甘愿废寝忘食，甚至倒贴"} ]},
        { text: "30. 假设公司神仙老板、不加班、涨薪30%，你的真实反应？", options: [ {s:1, t:"狂喜！干到退休！"}, {s:2, t:"大长舒一口气，待在舒适区真香"}, {s:3, t:"还不错，但隐隐觉得安逸是暂时的"}, {s:4, t:"身体舒服，但内心空落落，业务不认可"}, {s:5, t:"依然会为了热爱离开，舒适的牢笼也是牢笼"} ]}
    ];

    const resultsDB = {
        "L-H-L": { title: "【赛博困兽型】", tag: "灵魂在尖叫，钱包让你闭嘴。苟住保命，先存钱。", persona: "你是被现实捆住手脚的困兽，胸腔里全是对当前工作的抵触与不甘。但银行卡的余额像铁链把你锁在工位上。外部市场对你不友好，既无裸辞底气也无亮眼机会。", truth: "你的核心矛盾从来不是“要不要离职”，而是“生存优先级远高于情绪价值”。此刻失去收入的风险，比职场痛苦更致命。", guide: ["首要目标是筑牢现金流，强制储蓄先攒够 6-12 个月备用金。","开启“精神带薪摸鱼”模式，抽离情绪，只完成核心职责。","业余时间定向打磨核心技能，把力气用在撕开出口的准备上。"], warm: "我知道你每天都在咬牙硬撑，灵魂的呐喊在提醒你值得更好的人生。此刻的苟住不是认输，先把面包攥紧，再去谈星辰大海。" },
        "L-H-H": { title: "【蛰伏刺客型】", tag: "野心大但弹药不足。切勿裸辞！拿到下家 Offer 再走。", persona: "你是藏在暗处的蛰伏刺客，对当前工作忍无可忍。幸运的是市场看得见你的价值，优质机会正在招手。你唯独缺了裸辞的“安全弹药”，最忌讳冲动把好牌打烂。", truth: "你已站在跳槽的最佳窗口期，唯一的风险是冲动决策。裸辞会让你从主动选择变成被动求生，错失优质机会。", guide: ["绝对禁止裸辞，开启地下城潜行模式，80%精力放在面试谈薪上。","同步推进储蓄计划，攒够 3 个月过渡资金。","拿到书面 Offer 后再体面离职，平稳落地完成漂亮一击。"], warm: "真正的刺客从不因一时怒火暴露身形。你的野心值得一个万全的奔赴，等你手握 Offer、口袋有粮转身时，会比任何冲动都潇洒。" },
        "L-L-H": { title: "【待价而沽型】", tag: "悄悄拔尖，等待猎头报价。现状安全，继续深耕，等 30% 涨幅。", persona: "你是清醒理智的待价而沽者，当前工作安稳可控。你的能力被市场看见，你清楚自己身价，愿为更好的筹码耐心等待。不做冲动选择，只做收益最大化决策。", truth: "你没有必须离职的理由，却有随时跳槽的资本。最忌讳“为跳而跳”。核心任务是让身价持续增值，等真正匹配的机会。", guide: ["稳住基本盘，继续深耕积累亮眼项目成果，提高议价权。","和猎头保持良性沟通，锚定 30% 及以上薪资涨幅或职级跃升。","同步积累抗风险资金，为未来选择留足底气。"], warm: "你不必追赶浪潮，你本身就在价值上升通道里。清醒的等待是为了抓住风口。耐心，终会换来满载而归。" },
        "L-L-L": { title: "【防御性打工型】", tag: "只要我不发力，资本就休想剥削我。保住这份工是最高战略。", persona: "你是清醒务实的防御者，核心目标是稳定收入。你知道自己抗风险能力不足，外部市场不友好。你选择用最低的内耗，守住这份生活的基本盘。", truth: "对你而言，“稳定的现金流”最重要。职场是你维持生活的工具，你不用为自己的“不发力”愧疚，防御是对自己最负责的保护。", guide: ["把“保住这份工”作为核心战略，做个靠谱但不卷的员工。","强制储蓄，一点一滴筑牢抗风险护城河。","业余时间学习变现硬技能，拓展生存边界。"], warm: "在这个充满不确定性的时代，保护好自己本身就是了不起的事。先做一只稳稳扎根的蜗牛，想要的会在攒够底气时如约而至。" },
        "H-H-H": { title: "【觉醒猛禽型】", tag: "螺丝钉孔装不下金刚钻。完美的离职窗口，热爱是你的星辰大海！", persona: "你是彻底觉醒的长空猛禽，当前工位根本装不下你的野心。你有家底托底，市场也为你敞开大门。你拥有了职场人最羡慕的“绝对选择权”。", truth: "你正站在人生的黄金岔路口，完美离职窗口期。唯一要克服的是对未知的恐惧。你的能力值得更广阔的天地。", guide: ["果断抓住窗口期，启动离职流程，体面告别内耗。","不设限，去尝试热爱，甚至启动创业计划。","利用充足抗风险底气给自己试错空间，成为人生主角。"], warm: "你生来就该是翱翔长空的猛禽。不用回头，前方天地远比你想象更辽阔。去追风吧，你本就该生而热烈！" },
        "H-H-L": { title: "【带资重开型】", tag: "有钱任性，但离开光环有点迷茫。给自己一个 Gap Year 寻找方向。", persona: "你是手握筹码的人生重开者，有存款不发愁，对当前工作身心俱疲。但你并没有明确方向。你最需要的不是随便找下家，而是停下来，找到自己。", truth: "你最大的资本是“人生容错率”，你拥有“停下来的权利”。此刻迷茫是正常的，它在提醒你该听听内心的声音了。", guide: ["可以辞职，不用逼自己立刻找下家，给自己一个 Gap Year。","去尝试一直想做的事，把过往被工作剥夺的自己找回来。","不用焦虑空窗期，想清楚真正热爱什么再重新出发。"], warm: "你不必一直赶路，累了停下来没关系的。这段看似空白的时光，是你为人生重新校准方向的旅程。愿你找回自己，奔赴下一场山海。" },
        "H-L-H": { title: "【游刃有余型】", tag: "别人在渡劫，你在玩职场通关游戏。建议在内部创业或挑战新项目。", persona: "你是把职场玩成通关游戏的高阶玩家，工作得心应手无内耗。家底充足，能力受认可，外面大把机会。你需要想清楚跳槽增益是什么。", truth: "完全不需要辞职！当下平台就是最好试炼场。与其去陌生环境，不如利用积累和话语权去申请内部创业或新项目。", guide: ["申请内部创业、牵头新项目、开拓新赛道或核心岗位。","把公司资源变成成长跳板，用最小试错成本实现职业想法。","保持对外部机会的审视，但以“我为主”来决策。"], warm: "真正的职场高手是把手里的牌打出最漂亮玩法。你有随时离开的底气，更有把路走宽的智慧。活成人生掌舵人才是最酷的事。" },
        "H-L-L": { title: "【温水青蛙型】", tag: "你在非常舒服地走向平庸。立刻制造危机感学习新技能。", persona: "你是身处舒适区暗藏危机的安逸者，钱多事少离家近。但长期的安逸正在偷走你的人生主动权。请冷静想想风险来临时是否有应对准备。", truth: "当下的安稳不是躺平资本，而是自我提升的底牌。舒适区也存在风险，别让安逸剥夺了你离开的能力。", guide: ["人为制造危机感，制定成长计划，学习新技能了解新趋势。","尝试公司里有挑战的新项目，接触不同领域人脉。","发展一份副业，保持对市场敏感度，保持随时能离开的能力。"], warm: "舒服的日子让人舍不得。可真正的安稳是无论走到哪里都能站稳脚跟的能力。现在开始改变永远不晚，愿你既从容又有底气。" }
    };

    // --- 状态变量 ---
    let currentQ = 0;
    let scores = []; // 保存每题得分

    // DOM 元素
    const views = document.querySelectorAll('.view');
    const qText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const currQSpan = document.getElementById('curr-q');
    const progressBar = document.getElementById('progress-bar');
    const backBtn = document.getElementById('back-btn');

    // --- 【新增】页面初始化时校验缓存 ---
    document.addEventListener('DOMContentLoaded', () => {
        // 尝试从浏览器本地存储读取之前的测试结果
        const savedDataStr = localStorage.getItem('careerQuizResult');
        if (savedDataStr) {
            try {
                const savedData = JSON.parse(savedDataStr);
                // 如果有数据，直接渲染结果页并展示
                renderResultUI(savedData);
                switchView('page-result');
                // 等待页面切换完成后再渲染图表（防止宽度计算错误）
                setTimeout(() => renderRadar(savedData.radarData), 100);
            } catch (e) {
                // 如果数据损坏，清空并显示欢迎页
                localStorage.removeItem('careerQuizResult');
                switchView('page-welcome');
            }
        } else {
            // 没有数据，正常展示欢迎页
            switchView('page-welcome');
        }
    });

    // --- 核心逻辑 ---
    function switchView(viewId) {
        views.forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    function startQuiz() {
        currentQ = 0;
        scores = [];
        renderQuestion();
        switchView('page-quiz');
    }

    function renderQuestion() {
        const q = questions[currentQ];
        currQSpan.innerText = currentQ + 1;
        progressBar.style.width = ((currentQ) / 30 * 100) + '%';
        backBtn.style.visibility = currentQ > 0 ? 'visible' : 'hidden';

        qText.innerText = q.text;
        optionsContainer.innerHTML = '';
        
        q.options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerText = opt.t;
            card.onclick = () => handleSelect(opt.s);
            optionsContainer.appendChild(card);
        });
    }

    function handleSelect(score) {
        scores[currentQ] = score;
        if (currentQ < questions.length - 1) {
            currentQ++;
            renderQuestion();
        } else {
            progressBar.style.width = '100%';
            calculateAndShowResult();
        }
    }

    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            renderQuestion();
        }
    }

    function getSum(start, end) {
        return scores.slice(start, end + 1).reduce((a, b) => a + b, 0);
    }

    function calculateAndShowResult() {
        switchView('page-loading');

        setTimeout(() => {
            // 第一步：计算 6 维 Pct
            const Finance_Pct = (getSum(0, 4) - 5) / 20 * 100;
            const Risk_Pct = (getSum(5, 7) - 3) / 12 * 100;
            const Burnout_Pct = (getSum(8, 13) - 6) / 24 * 100;
            const Stagnation_Pct = (getSum(14, 19) - 6) / 24 * 100;
            const Market_Pct = (getSum(20, 25) - 6) / 24 * 100;
            const Drive_Pct = (getSum(26, 29) - 4) / 16 * 100;

            const radarData = [Finance_Pct, Burnout_Pct, Stagnation_Pct, Market_Pct, Drive_Pct, Risk_Pct];
            const dimScores = [Finance_Pct, Risk_Pct, Burnout_Pct, Stagnation_Pct, Market_Pct, Drive_Pct];

            // 第二步：宏观 3 维
            const Base_Raw = getSum(0, 4) + getSum(5, 7);
            const Base_Pct = (Base_Raw - 8) / 32 * 100;

            const Push_Raw = getSum(8, 13) + getSum(14, 19);
            const Push_Pct = (Push_Raw - 12) / 48 * 100;

            const Pull_Raw = getSum(20, 25) + getSum(26, 29);
            const Pull_Pct = (Pull_Raw - 10) / 40 * 100;

            // 第三步：判定阈值
            const baseStr = Base_Pct >= 60 ? 'H' : 'L';
            const pushStr = Push_Pct >= 60 ? 'H' : 'L';
            const pullStr = Pull_Pct >= 60 ? 'H' : 'L';
            const key = `${baseStr}-${pushStr}-${pullStr}`;
            
            // 【新增】构造需要保存的数据对象
            const saveData = {
                Base_Pct: Base_Pct,
                radarData: radarData,
                dimScores: dimScores,
                resultKey: key
            };

            // 【新增】将测试结果存入本地缓存
            localStorage.setItem('careerQuizResult', JSON.stringify(saveData));

            // 调用分离出来的 UI 渲染函数
            renderResultUI(saveData);
            switchView('page-result');
            setTimeout(() => renderRadar(radarData), 100);

        }, 1200); // 1.2s 动画模拟
    }

    // --- 【新增】将渲染结果页的逻辑单独提取出来，方便答题完和读取缓存时复用 ---
    function renderResultUI(data) {
        const resultData = resultsDB[data.resultKey] || resultsDB["L-L-L"];

        // 熔断机制：Base_Pct < 25 触发红条警告
        if (data.Base_Pct < 25) {
            document.getElementById('veto-banner').style.display = 'block';
        } else {
            document.getElementById('veto-banner').style.display = 'none';
        }

        document.getElementById('res-title').innerText = resultData.title;
        document.getElementById('res-tag').innerText = resultData.tag;
        document.getElementById('res-persona').innerText = resultData.persona;
        document.getElementById('res-truth').innerText = resultData.truth;
        document.getElementById('res-warm').innerText = resultData.warm;

        const guideUl = document.getElementById('res-guide');
        guideUl.innerHTML = '';
        resultData.guide.forEach(item => {
            const li = document.createElement('li');
            li.innerText = item;
            guideUl.appendChild(li);
        });

        // 渲染进度条列表
        const dimNames = ["财务安全", "风险承受", "身心耗竭", "职业瓶颈", "市场竞争", "核心驱动"];
        const colorGreen = "var(--accent-green)";
        const colorBrown = "var(--accent-brown)";
        const dimColors = [colorGreen, colorGreen, colorBrown, colorBrown, colorGreen, colorGreen];
        
        const dimContainer = document.getElementById('dim-bars');
        dimContainer.innerHTML = '';
        dimNames.forEach((name, idx) => {
            const val = Math.round(data.dimScores[idx]);
            dimContainer.innerHTML += `
                <div class="dim-item">
                    <div class="dim-header"><span>${name}</span><span>${val}%</span></div>
                    <div class="dim-bg"><div class="dim-fill" style="width: ${val}%; background-color: ${dimColors[idx]}"></div></div>
                </div>
            `;
        });
    }

    function renderRadar(dataArray) {
        const chartDom = document.getElementById('radar-chart');
        const myChart = echarts.init(chartDom);
        const option = {
            radar: {
                indicator: [
                    { name: '财务安全', max: 100 },
                    { name: '身心耗竭', max: 100 },
                    { name: '职业瓶颈', max: 100 },
                    { name: '市场竞争', max: 100 },
                    { name: '核心驱动', max: 100 },
                    { name: '风险承受', max: 100 }
                ],
                center: ['50%', '50%'],
                radius: 100,
                splitNumber: 4,
                axisName: { color: '#8c8278', fontSize: 13, fontWeight: 500 }, 
                splitArea: { 
                    areaStyle: { 
                        color: ['rgba(139,168,136, 0.02)', 'rgba(139,168,136, 0.05)','rgba(139,168,136, 0.08)','rgba(139,168,136, 0.12)'] 
                    } 
                },
                axisLine: { lineStyle: { color: 'rgba(196,178,161, 0.3)' } }, 
                splitLine: { lineStyle: { color: 'rgba(196,178,161, 0.3)' } } 
            },
            series: [{
                type: 'radar',
                data: [{
                    value: dataArray,
                    name: '维测结果',
                    areaStyle: { color: 'rgba(139, 168, 136, 0.4)' }, 
                    lineStyle: { color: '#8ba888', width: 2 }, 
                    itemStyle: { color: '#8ba888' }
                }]
            }]
        };
        myChart.setOption(option);
    }

    // --- 【新增】重新测试：清空缓存并刷新页面 ---
    function restartQuiz() {
        localStorage.removeItem('careerQuizResult');
        location.reload();
    }
</script>
</body>
</html>
